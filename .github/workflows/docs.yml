name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build docs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build and upload Astro site
        uses: withastro/action@v6
        with:
          path: .
          node-version: 22
          build-cmd: pnpm build
          out-dir: apps/docs/dist
          cache-dir: apps/docs/node_modules/.astro
        env:
          DEPLOY_GITHUB_PAGES: "true"

  deploy:
    name: Deploy docs
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
