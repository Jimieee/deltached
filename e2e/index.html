<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>deltached e2e fixture</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      #trigger {
        position: fixed;
        top: 24px;
        left: 24px;
        width: 120px;
        height: 44px;
      }
      #panel {
        position: fixed;
        inset: 0;
        margin: auto;
        width: 320px;
        height: 240px;
        padding: 16px;
        background: #ffffff;
        border: 1px solid #cccccc;
        border-radius: 12px;
      }
      #panel[hidden] {
        display: none;
      }
    </style>
  </head>
  <body>
    <button id="trigger" type="button">Open</button>

    <div id="panel" hidden>
      <button data-close type="button">Close</button>
      <h2>Panel</h2>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
